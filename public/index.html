<!DOCTYPE html>
<html>
<head>
<style>
body{text-align:center;font-family:Arial}

.card{
  border:2px solid black;
  width:200px;
  margin:auto;
}

.header{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  font-weight:bold;
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

.cell{
  border:1px solid black;
  padding:10px;
}
</style>
</head>

<body>

<h2>BINGO</h2>

<input id="phone" placeholder="Phone">
<input id="txid" placeholder="TXID">

<button onclick="startApp()">Start</button>
<button onclick="pay()">Send Payment</button>
<button onclick="join()">Pick Cartela (10 ETB)</button>
<button onclick="startGame()">Start Game</button>

<h3>Balance: <span id="bal">0</span></h3>
<h3 id="count"></h3>

<div id="card"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();

let phone="";
let card=[];

async function startApp(){
  phone=document.getElementById("phone").value;

  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone})
  });

  loadBalance();
}

async function pay(){
  const txid=document.getElementById("txid").value;

  await fetch("/pay",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone,txid})
  });

  alert("Sent to admin");
}

async function loadBalance(){
  const res=await fetch("/balance/"+phone);
  const data=await res.json();
  document.getElementById("bal").innerText=data.balance;
}

async function join(){
  const res=await fetch("/join",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone})
  });

  const data=await res.json();

  if(!data.ok){
    alert(data.msg);
    return;
  }

  card=data.cartela;
  renderCard();
  loadBalance();
}

/* ===== CARD WITH HEADER ===== */
function renderCard(){
  let html=`
  <div class="card">
    <div class="header">
      <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
    </div>
    <div class="grid">
      ${card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
    </div>
  </div>`;

  document.getElementById("card").innerHTML=html;
}

function startGame(){
  socket.emit("start");
}

socket.on("countdown",t=>{
  document.getElementById("count").innerText="Countdown: "+t;
});
</script>

</body>
</html>
