<!DOCTYPE html>
<html>
<head>
  <title>Bingo</title>
</head>
<body>

<h2>Bingo Game</h2>

<input id="phone" placeholder="Enter phone" />
<button onclick="register()">Start</button>

<h3>Balance: <span id="bal">0</span></h3>

<button onclick="deposit()">💸 Deposit</button>
<button onclick="joinGame()">🎮 Join Game</button>
<button onclick="startGame()">🚀 Start</button>

<h3>Countdown: <span id="count">0</span></h3>
<h3>Numbers:</h3>
<div id="nums"></div>

<h3>Your Cartela:</h3>
<div id="cartela"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let phone = "";

async function register() {
  phone = document.getElementById("phone").value;

  await fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone })
  });

  loadBalance();
}

async function loadBalance() {
  const res = await fetch("/balance/" + phone);
  const data = await res.json();
  document.getElementById("bal").innerText = data.balance;
}

async function deposit() {
  await fetch("/deposit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone, amount: 50 })
  });

  loadBalance();
}

async function joinGame() {
  const res = await fetch("/join", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone })
  });

  const data = await res.json();

  if (data.ok) {
    document.getElementById("cartela").innerText =
      JSON.stringify(data.cartela);
    loadBalance();
  } else {
    alert(data.msg);
  }
}

function startGame() {
  socket.emit("start");
}

socket.on("countdown", (t) => {
  document.getElementById("count").innerText = t;
});

socket.on("number", (n) => {
  document.getElementById("nums").innerHTML += n + " ";
});
</script>

</body>
</html>
