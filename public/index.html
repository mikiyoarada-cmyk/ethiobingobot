<!DOCTYPE html>
<html>
<head>
<style>
.grid{display:grid;grid-template-columns:repeat(5,40px);gap:2px}
.cell{border:1px solid black;padding:5px;text-align:center}
.card{border:2px solid black;margin:5px;padding:5px;display:inline-block}
.header{display:grid;grid-template-columns:repeat(5,40px);font-weight:bold}
</style>
</head>
<body>

<input id="phone" placeholder="Phone">
<button onclick="startApp()">Start</button>
<button onclick="join()">Get Cartelas</button>
<button onclick="startGame()">Start Game</button>

<h3 id="count"></h3>
<div id="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let phone="";

async function startApp(){
  phone=document.getElementById("phone").value;
  await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone})});
}

async function join(){
  const res=await fetch("/join",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone})});
  const data=await res.json();

  if(!data.ok){
    alert(data.msg);
    return;
  }

  generate600();
}

/* ===== 600 CARTELAS ===== */
function generate600(){
  let html="";

  for(let i=1;i<=600;i++){
    html+=`
    <div class="card">
      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>
      <div class="grid">
        ${Array.from({length:25}).map(()=>`<div class="cell">${Math.floor(Math.random()*75)+1}</div>`).join("")}
      </div>
    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
}

function startGame(){
  socket.emit("start");
}

socket.on("countdown",t=>{
  document.getElementById("count").innerText="Countdown: "+t;
});
</script>

</body>
</html>
