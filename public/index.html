<!DOCTYPE html>
<html>
<head>
  <title>Bingo Pro</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      margin-top: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    .card {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 5px;
      justify-content: center;
      margin-top: 15px;
    }

    .cell {
      background: white;
      border: 2px solid black;
      padding: 12px;
      font-weight: bold;
    }

    .hit {
      background: limegreen;
      color: white;
    }

    .header {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 5px;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      margin-top: 20px;
    }

    .box {
      background: gold;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<input id="phone" placeholder="Enter phone"/>
<button onclick="register()">Start</button>

<br>

<input id="room" placeholder="Room (e.g 1)"/>
<button onclick="join()">Join Room</button>
<button onclick="startGame()">Start Game</button>

<h3>⏳ Countdown: <span id="count">0</span></h3>

<h3>📢 Called Numbers</h3>
<div id="called"></div>

<h3>🏆 Winner</h3>
<div id="winner"></div>

<h3>🎮 Your Card</h3>

<!-- BINGO HEADER -->
<div class="header">
  <div class="box">B</div>
  <div class="box">I</div>
  <div class="box">N</div>
  <div class="box">G</div>
  <div class="box">O</div>
</div>

<div id="card" class="card"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let phone = "";
let room = "";
let card = [];
let called = [];

/* REGISTER */
function register() {
  phone = document.getElementById("phone").value;

  fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone })
  });
}

/* JOIN ROOM */
async function join() {
  room = document.getElementById("room").value;

  const res = await fetch("/join", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone, room })
  });

  const data = await res.json();

  if (!data.ok) {
    alert("❌ Not approved");
    return;
  }

  card = data.cartela;
  called = [];

  socket.emit("joinRoom", room);

  renderCard();
}

/* RENDER CARD */
function renderCard() {
  let html = "";

  card.flat().forEach(n => {

    let isHit = called.includes(n) || n === "FREE";

    html += `<div class="cell ${isHit ? "hit" : ""}">${n}</div>`;
  });

  document.getElementById("card").innerHTML = html;
}

/* START GAME */
function startGame() {
  socket.emit("start", room);
}

/* SOCKET EVENTS */
socket.on("countdown", t => {
  document.getElementById("count").innerText = t;
});

socket.on("number", n => {
  called.push(n);
  renderCard();
});

socket.on("called", list => {
  document.getElementById("called").innerText = list.join(", ");
});

socket.on("winner", w => {
  document.getElementById("winner").innerText = "🏆 " + w;
});
</script>

</body>
</html>
