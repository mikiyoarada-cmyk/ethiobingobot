<!DOCTYPE html>
<html>
<head>
  <title>Bingo Pro</title>
  <style>
    body { font-family: Arial; text-align:center; }

    .grid {
      display:grid;
      grid-template-columns: repeat(5, 60px);
      gap:5px;
      justify-content:center;
      margin-top:10px;
    }

    .cell {
      border:1px solid #000;
      padding:10px;
    }

    .hit {
      background: limegreen;
      color: white;
      font-weight:bold;
    }
  </style>
</head>
<body>

<h2>🎯 BINGO PRO</h2>

<input id="phone" placeholder="Phone"/>
<button onclick="register()">Start</button>
<button onclick="join()">Join Game</button>
<button onclick="start()">Start Game</button>

<h3>⏳ Countdown: <span id="count">0</span></h3>

<h3>📢 Called Numbers</h3>
<div id="called"></div>

<h3>👥 Players</h3>
<div id="players"></div>

<h3>🏆 Winner</h3>
<div id="winner"></div>

<h3>🎮 Your Cartela</h3>
<div id="card" class="grid"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let phone = "";
let card = [];
let called = [];

function register() {
  phone = document.getElementById("phone").value;

  fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone })
  });
}

async function join() {
  const res = await fetch("/join", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone })
  });

  const data = await res.json();

  if (!data.ok) {
    alert("Not approved");
    return;
  }

  card = data.cartela;
  renderCard();
}

function renderCard() {
  let html = "";

  card.flat().forEach(n => {
    let cls = called.includes(n) ? "cell hit" : "cell";
    html += `<div class="${cls}">${n}</div>`;
  });

  document.getElementById("card").innerHTML = html;
}

function start() {
  socket.emit("start");
}

socket.on("countdown", t => {
  document.getElementById("count").innerText = t;
});

socket.on("number", n => {
  called.push(n);
  renderCard();
});

socket.on("calledList", list => {
  document.getElementById("called").innerText = list.join(", ");
});

socket.on("winner", w => {
  document.getElementById("winner").innerText = "🏆 " + w;
});

socket.on("players", p => {
  document.getElementById("players").innerText = p.join(", ");
});
</script>

</body>
</html>
