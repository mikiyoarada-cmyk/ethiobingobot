<!DOCTYPE html>
<html>
<head>
<title>Bingo</title>

<style>
body { font-family: Arial; text-align:center; }

/* CARD GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(5,60px);
  gap:5px;
  justify-content:center;
  margin-top:10px;
}

/* CELLS */
.cell {
  border:1px solid black;
  padding:10px;
  font-weight:bold;
}

/* HEADER */
.header {
  display:grid;
  grid-template-columns: repeat(5,60px);
  justify-content:center;
  margin-top:10px;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<h2>🎯 BINGO</h2>

<input id="phone" placeholder="Phone">
<button onclick="startApp()">Start</button>

<h3>💰 Balance: <span id="bal">0</span></h3>

<button onclick="deposit()">Deposit 50</button>
<button onclick="join()">Pick Cartela</button>
<button onclick="startGame()">Start Game</button>

<h3>⏳ Countdown: <span id="count">0</span></h3>

<h3>📢 Called</h3>
<div id="called"></div>

<h3>👥 Players</h3>
<div id="players"></div>

<h3>🏆 Winner</h3>
<div id="winner"></div>

<h3>🎮 Your Cartela</h3>

<!-- ✅ FIXED HEADER -->
<div class="header">
  <div>B</div>
  <div>I</div>
  <div>N</div>
  <div>G</div>
  <div>O</div>
</div>

<!-- CARD -->
<div id="card" class="grid"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let phone="";
let card=[];
let called=[];

async function startApp(){
  phone=document.getElementById("phone").value;

  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone})
  });

  loadBalance();
}

async function loadBalance(){
  const res=await fetch("/balance/"+phone);
  const data=await res.json();
  document.getElementById("bal").innerText=data.balance;
}

async function deposit(){
  await fetch("/deposit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone,amount:50})
  });

  loadBalance();
}

async function join(){
  const res=await fetch("/join",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({phone})
  });

  const data=await res.json();

  if(!data.ok){
    alert(data.msg);
    return;
  }

  card=data.cartela;
  renderCard();
  loadBalance();
}

/* ✅ FIXED CARD RENDER */
function renderCard(){
  let html="";

  card.flat().forEach(n=>{
    html+=`<div class="cell">${n}</div>`;
  });

  document.getElementById("card").innerHTML=html;
}

function startGame(){
  socket.emit("start");
}

/* SOCKET EVENTS */
socket.on("countdown",t=>{
  document.getElementById("count").innerText=t;
});

socket.on("called",list=>{
  document.getElementById("called").innerText=list.join(", ");
});

socket.on("players",p=>{
  document.getElementById("players").innerText=p.join(", ");
});

socket.on("winner",w=>{
  document.getElementById("winner").innerText="🏆 "+w;
});
</script>

</body>
</html>
