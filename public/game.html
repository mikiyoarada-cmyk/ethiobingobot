<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5}
button{padding:10px;margin:5px;cursor:pointer}
.card{border:2px solid #000;margin:5px;padding:5px;display:inline-block}
.cell{border:1px solid #000;padding:5px}
.mark{background:green;color:white}
</style>
</head>

<body>

<h2>🎯 REAL BINGO SYSTEM</h2>

<input id="phone" placeholder="Enter phone">
<button onclick="join()">Join</button>
<button onclick="start()">Start</button>
<button onclick="bingo()">BINGO</button>

<h3 id="balance"></h3>
<h3 id="called"></h3>

<div id="card"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myPhone = "";

/* JOIN */
function join(){
  myPhone = document.getElementById("phone").value;
  socket.emit("join",myPhone);
}

/* START */
function start(){
  socket.emit("start");
}

/* BINGO */
function bingo(){
  socket.emit("bingo",{phone:myPhone});
}

/* CARD */
socket.on("card",(card)=>{
  document.getElementById("card").innerHTML =
  card.map(r=>r.map(n=>`<div class="cell">${n}</div>`).join("")).join("<br>");
});

/* BALANCE */
socket.on("balance",(b)=>{
  document.getElementById("balance").innerText = "💰 "+b;
});

/* NUMBERS */
socket.on("called",(nums)=>{
  document.getElementById("called").innerText =
  "Called: " + nums.join(",");
});

/* WIN */
socket.on("win",(w)=>{
  alert("🏆 YOU WIN " + w);
});

</script>

</body>
</html>
