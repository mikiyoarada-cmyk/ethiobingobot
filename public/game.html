<!DOCTYPE html>
<html>
<head>
  <title>Bingo Game</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(5,60px); gap:5px; justify-content:center; }
    .cell { border:1px solid black; padding:10px; }
    .marked { background: yellow; }
  </style>
</head>

<body>

<h1>B I N G O</h1>

<input id="phone" placeholder="Enter phone">
<button onclick="join()">Join Game (10 ETB)</button>

<h3 id="balance"></h3>

<h2 id="countdown"></h2>

<div class="grid" id="card"></div>

<h3>Called Numbers:</h3>
<div id="called"></div>

<h2 id="winner"></h2>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let card = [];

/* JOIN GAME */
async function join(){
  const phone = document.getElementById("phone").value;

  const res = await fetch("/join",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ phone })
  });

  const data = await res.json();

  if(!data.ok){
    alert(data.msg);
    return;
  }

  card = data.cartela;
  document.getElementById("balance").innerText = "Balance: "+data.balance;

  drawCard();
}

/* DRAW CARD */
function drawCard(){
  const grid = document.getElementById("card");
  grid.innerHTML = "";

  card.forEach(row=>{
    row.forEach(cell=>{
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = cell;
      grid.appendChild(div);
    });
  });
}

/* MARK NUMBERS */
function mark(num){
  document.querySelectorAll(".cell").forEach(c=>{
    if(c.innerText == num){
      c.classList.add("marked");
    }
  });
}

/* SOCKET EVENTS */
socket.on("countdown", t=>{
  document.getElementById("countdown").innerText = "Starting in: "+t;
});

socket.on("number", n=>{
  mark(n);
});

socket.on("called", arr=>{
  document.getElementById("called").innerText = arr.join(", ");
});

socket.on("winner", w=>{
  document.getElementById("winner").innerText =
    "🏆 WINNER: "+w.phone+" ("+w.winner+" ETB)";
});

socket.on("message", m=>{
  alert(m);
});

/* AUTO START */
socket.emit("start");
</script>

</body>
</html>
