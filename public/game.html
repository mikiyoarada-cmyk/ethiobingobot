<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#f5f5f5;
}

h2{margin-top:10px}

button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  border:2px solid #000;
  margin:5px;
  padding:5px;
  width:150px;
  background:white;
  cursor:pointer;
}

.selected{
  border:3px solid orange;
}

.header{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  font-weight:bold;
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

.cell{
  border:1px solid #000;
  padding:4px;
  font-size:12px;
}

.mark{
  background:green;
  color:white;
}

#status{
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<div id="status">Connecting...</div>

<button id="soundBtn">🔊 Enable Sound</button>
<button id="loadBtn">Load 600 Cards</button>
<button id="confirmBtn">Confirm Cartelas</button>

<h3 id="called"></h3>

<div id="cards" class="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let audioEnabled = false;
let selectedCards = new Set();
let allCards = [];
let myPhone = "user_" + Math.floor(Math.random()*100000);

/* ================= SOUND ================= */
document.getElementById("soundBtn").onclick = () => {
  audioEnabled = true;
  new Audio("/voices/B1.mp3").play().catch(()=>{});
  alert("✅ Sound Enabled");
};

function playVoice(num){
  if(!audioEnabled) return;

  let letter="";
  if(num<=15) letter="B";
  else if(num<=30) letter="I";
  else if(num<=45) letter="N";
  else if(num<=60) letter="G";
  else letter="O";

  const audio=new Audio(`/voices/${letter}${num}.mp3`);
  audio.play().catch(()=>{});
}

/* ================= CARD ================= */
function unique(min,max){
  let arr=[];
  while(arr.length<5){
    let n=Math.floor(Math.random()*(max-min+1))+min;
    if(!arr.includes(n)) arr.push(n);
  }
  return arr.sort((a,b)=>a-b);
}

function createCard(){
  const B=unique(1,15);
  const I=unique(16,30);
  const N=unique(31,45);
  const G=unique(46,60);
  const O=unique(61,75);

  return [
    [B[0],I[0],N[0],G[0],O[0]],
    [B[1],I[1],N[1],G[1],O[1]],
    [B[2],I[2],"FREE",G[2],O[2]],
    [B[3],I[3],N[3],G[3],O[3]],
    [B[4],I[4],N[4],G[4],O[4]],
  ];
}

/* ================= LOAD CARDS ================= */
document.getElementById("loadBtn").onclick = () => {

  let html="";
  allCards=[];

  for(let i=0;i<600;i++){
    const c=createCard();
    allCards.push(c);

    html+=`
    <div class="card" onclick="toggleCard(${i})" id="card${i}">
      <b>Card ${i+1}</b>

      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div class="grid">
        ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
  alert("✅ 600 Cards Loaded");
};

/* ================= SELECT ================= */
function toggleCard(i){

  const el=document.getElementById("card"+i);

  if(selectedCards.has(i)){
    selectedCards.delete(i);
    el.classList.remove("selected");
  }else{
    selectedCards.add(i);
    el.classList.add("selected");
  }
}

/* ================= CONFIRM ================= */
document.getElementById("confirmBtn").onclick = () => {

  if(selectedCards.size===0){
    alert("Select at least 1 card");
    return;
  }

  socket.emit("select_cartelas",{
    phone:myPhone,
    cards:[...selectedCards]
  });

  alert("✅ Cartelas Confirmed");
};

/* ================= JOIN ================= */
socket.emit("join",{
  phone:myPhone,
  telegramName:myPhone
});

/* ================= SOCKET ================= */

socket.on("phase",(p)=>{

  if(p==="picking"){
    document.getElementById("status").innerText="🟢 PICK YOUR CARTELAS (30 sec)";
  }

  if(p==="playing"){
    document.getElementById("status").innerText="🎮 GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="⏳ WAIT FOR NEXT GAME";
  }
});

socket.on("countdown",(t)=>{
  document.getElementById("status").innerText =
    "⏳ Start in " + t;
});

socket.on("number",(n)=>{
  playVoice(n);
});

socket.on("called",(nums)=>{

  document.getElementById("called").innerText =
    nums.length ? "Called Numbers: " + nums.join(", ") : "";

  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("mark");
    if(nums.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });

});

socket.on("winner",(w)=>{
  alert("🏆 WINNER: " + w.telegramName);
});

socket.on("game_end",(m)=>{
  alert(m);
});

/* ================= SPECTATOR ================= */
socket.on("msg",(m)=>{
  alert(m);
});

</script>

</body>
</html>
