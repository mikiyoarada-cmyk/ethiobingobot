<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:5px;padding:5px;width:150px;background:#fff;cursor:pointer}
.selected{border:3px solid green}
.header{display:grid;grid-template-columns:repeat(5,1fr);background:#ddd}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:4px}
.mark{background:green;color:#fff}
</style>
</head>

<body>

<h2>BINGO</h2>
<h3 id="status"></h3>
<h3 id="called"></h3>

<div id="cards" class="cards"></div>

<button onclick="enableSound()">🔊 Enable Sound</button>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket=io();

let phone=prompt("Phone");
let name=prompt("Telegram name");

let selected=[];
let audioEnabled=false;

socket.emit("join",{phone,telegramName:name});

/* SOUND */
function enableSound(){
  audioEnabled=true;
  new Audio("/voices/B1.mp3").play().catch(()=>{});
}

/* LOAD */
socket.on("cards",(cards)=>{

  let html="";

  cards.forEach((c,i)=>{

    html+=`
    <div class="card" onclick="pick(${i})" id="c${i}">
      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>
      <div class="grid">
        ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>`;
  });

  document.getElementById("cards").innerHTML=html;
  window.allCards=cards;
});

/* PICK */
function pick(i){

  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    document.getElementById("c"+i).classList.remove("selected");
  }else{
    selected.push(i);
    document.getElementById("c"+i).classList.add("selected");
  }
}

/* PHASE */
socket.on("phase",(p)=>{

  if(p==="picking"){
    document.getElementById("status").innerText="PICK NOW (30s)";
    socket.emit("select_cartelas",{
      phone,
      cards:selected.map(i=>allCards[i])
    });
  }

  if(p==="playing"){
    document.getElementById("status").innerText="GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="WAIT NEXT GAME";
  }
});

/* BLOCK MESSAGE */
socket.on("msg",(m)=>alert(m));

/* COUNTDOWN */
socket.on("countdown",(t)=>{
  document.getElementById("status").innerText="Start in "+t;
});

/* VOICE FIXED */
socket.on("number",(n)=>{
  if(!audioEnabled) return;

  let letter = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
  new Audio(`/voices/${letter}${n}.mp3`).play().catch(()=>{});
});

/* CALLED */
socket.on("called",(arr)=>{

  document.getElementById("called").innerText="Called: "+arr.join(",");

  document.querySelectorAll(".cell").forEach(c=>{
    if(arr.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });
});

/* WINNER */
socket.on("winner",(w)=>{
  alert("🏆 "+w.telegramName+" WON");
});

/* END */
socket.on("game_end",(m)=>{
  document.getElementById("status").innerText=m;
});

</script>
</body>
</html>
