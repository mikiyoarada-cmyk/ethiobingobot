<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
.card{border:2px solid #000;margin:10px auto;padding:5px;width:200px;background:#fff}
.header{display:grid;grid-template-columns:repeat(5,1fr);background:#ddd;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:6px}
.mark{background:green;color:#fff}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>
<h3 id="status"></h3>
<h3 id="called"></h3>

<div id="card"></div>

<button onclick="enableSound()">🔊 Enable Sound</button>
<button onclick="joinGame()">Join Game</button>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let myCard=null;
let joined=false;
let audioEnabled=false;

function enableSound(){
  audioEnabled=true;
  new Audio("/voices/B1.mp3").play().catch(()=>{});
}

let phone=prompt("Enter Phone");
let name=prompt("Enter Telegram Name");

function joinGame(){

  if(joined) return;

  socket.emit("join",{phone,telegramName:name});
  joined=true;
}

/* ================= LOAD CARD ================= */
socket.on("card",(card)=>{

  myCard=card;

  let html=`
  <div class="card">
    <div class="header">
      <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
    </div>
    <div class="grid">
      ${card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
    </div>
  </div>
  `;

  document.getElementById("card").innerHTML=html;
});

/* ================= AUTO SELECT ================= */
socket.on("phase",(p)=>{

  if(p==="picking"){
    document.getElementById("status").innerText="🟢 AUTO JOINED";
    socket.emit("select_cartela",{phone});
  }

  if(p==="playing"){
    document.getElementById("status").innerText="🎮 GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="WAIT NEXT GAME";
  }
});

/* ================= MSG ================= */
socket.on("msg",(m)=>{
  alert(m);
});

/* ================= COUNTDOWN ================= */
socket.on("countdown",(t)=>{
  document.getElementById("status").innerText="Start in "+t;
});

/* ================= NUMBER ================= */
socket.on("number",(n)=>{
  if(audioEnabled){
    let letter = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
    new Audio(`/voices/${letter}${n}.mp3`).play().catch(()=>{});
  }
});

/* ================= CALLED ================= */
socket.on("called",(arr)=>{

  document.getElementById("called").innerText=
    "Called: "+arr.join(",");

  document.querySelectorAll(".cell").forEach(c=>{
    if(arr.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });
});

/* ================= WINNER ================= */
socket.on("winner",(w)=>{

  document.getElementById("status").innerText=
    "🏆 "+w.telegramName+" WON";

});

/* ================= END ================= */
socket.on("game_end",(m)=>{
  document.getElementById("status").innerText=m;
});

</script>
</body>
</html>
