<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5;}
.card{display:inline-block;border:2px solid #000;margin:10px;padding:5px;}
.cell{border:1px solid #000;padding:5px;width:30px;display:inline-block;}
.mark{background:green;color:white;}
#countdown{font-size:20px;}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<h3 id="countdown"></h3>
<h3 id="called"></h3>

<div id="card"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();

let phone=prompt("Enter phone:");
socket.emit("join",phone);

socket.on("card",(c)=>{

  let html="<div class='card'>";

  c.forEach(row=>{
    row.forEach(n=>{
      html+=`<div class='cell'>${n}</div>`;
    });
    html+="<br>";
  });

  html+="</div>";

  document.getElementById("card").innerHTML=html;
});

socket.on("countdown",(t)=>{
  document.getElementById("countdown")="Starts in: "+t;
});

socket.on("number",(n)=>{
  document.querySelectorAll(".cell").forEach(c=>{
    if(Number(c.innerText)==n){
      c.classList.add("mark");
    }
  });
});

socket.on("called",(arr)=>{
  document.getElementById("called").innerText=arr.join(",");
});

socket.on("winner",(w)=>{
  alert("🏆 WINNER: "+w.phone);
});

socket.on("game_end",(m)=>{
  alert(m);
});
</script>

</body>
</html>
