<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#f5f5f5;
}

button{
  padding:10px;
  margin:5px;
}

#cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  border:2px solid #000;
  margin:5px;
  padding:5px;
  width:160px;
  cursor:pointer;
  background:white;
}

.card.selected{
  border:4px solid gold;
}

.header{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  font-weight:bold;
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

.cell{
  border:1px solid #000;
  font-size:12px;
  padding:3px;
}

.mark{
  background:green;
  color:white;
}

#called{
  font-size:18px;
}

#status{
  font-size:20px;
  color:red;
  margin:10px;
}
</style>
</head>

<body>

<h2>🎯 MULTIPLAYER BINGO</h2>

<div id="status"></div>
<h3 id="countdown"></h3>
<h3 id="called"></h3>

<button onclick="loadCards()">Load 600 Cards</button>
<button onclick="confirmCards()">Confirm Selection</button>

<div id="cards"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let phone = prompt("Enter phone:");
let telegramName = prompt("Enter Telegram name:");

socket.emit("join",{phone,telegramName});

let selectedCards = [];

/* ================= LOAD 600 CARDS ================= */
function loadCards(){

  let html="";

  for(let i=1;i<=600;i++){

    let card = generateCard();

    html+=`
    <div class="card" onclick="selectCard(this,${i})">

      <b>Cartela ${i}</b>

      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div class="grid">
        ${card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>

    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
}

/* ================= GENERATE CARD ================= */
function generateCard(){

  function r(min,max){
    let a=[];
    while(a.length<5){
      let n=Math.floor(Math.random()*(max-min+1))+min;
      if(!a.includes(n)) a.push(n);
    }
    return a.sort((a,b)=>a-b);
  }

  const B=r(1,15),I=r(16,30),N=r(31,45),G=r(46,60),O=r(61,75);

  return [
    [B[0],I[0],N[0],G[0],O[0]],
    [B[1],I[1],N[1],G[1],O[1]],
    [B[2],I[2],"FREE",G[2],O[2]],
    [B[3],I[3],N[3],G[3],O[3]],
    [B[4],I[4],N[4],G[4],O[4]],
  ];
}

/* ================= SELECT CARDS ================= */
function selectCard(el,index){

  el.classList.toggle("selected");

  if(el.classList.contains("selected")){
    selectedCards.push(index);
  }else{
    selectedCards=selectedCards.filter(x=>x!==index);
  }
}

/* ================= SEND SELECTED ================= */
function confirmCards(){

  socket.emit("select_cartelas",{
    phone,
    cards:selectedCards
  });

  alert("Cartelas confirmed ✔");
}

/* ================= SOCKET EVENTS ================= */

/* ===== PHASE CONTROL (YOUR REQUEST MERGED) ===== */
socket.on("phase",(p)=>{

  if(p==="picking"){
    alert("🟢 PICK YOUR CARTELAS (30 sec)");
  }

  if(p==="playing"){
    alert("🎮 GAME STARTED");
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="WAIT FOR NEXT GAME";
  }
});

/* countdown */
socket.on("countdown",(t)=>{
  document.getElementById("countdown").innerText="Starts in: "+t;
});

/* called numbers */
socket.on("called",(nums)=>{
  document.getElementById("called").innerText=nums.join(",");

  document.querySelectorAll(".cell").forEach(c=>{
    if(nums.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });
});

/* voice caller (ALL 75 FIXED) */
socket.on("number",(n)=>{

  let audio = new Audio(`/voices/B${n}.mp3`);
  audio.play().catch(()=>{});
});

/* ===== WINNER (YOUR REQUEST MERGED) ===== */
socket.on("winner",(w)=>{

  alert("🏆 WINNER: "+w.telegramName);

  console.log("Winning Numbers:",w.numbers);
});

/* game end */
socket.on("game_end",(m)=>{
  alert(m);
});

</script>

</body>
</html>
