<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo</title>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#f5f5f5;
}

#cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  border:2px solid #000;
  margin:5px;
  padding:5px;
  width:150px;
  background:white;
}

.header{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  font-weight:bold;
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

.cell{
  border:1px solid #000;
  padding:5px;
  font-size:12px;
}

.mark{
  background:green;
  color:white;
}

.selected{
  border:4px solid gold;
}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<h3 id="status"></h3>
<h3 id="countdown"></h3>
<h3 id="called"></h3>

<button onclick="loadCards()">Load 600 Cards</button>
<button onclick="confirmCards()">Confirm Cartelas</button>

<div id="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let phone = prompt("Enter phone");
let telegramName = prompt("Enter telegram name");

socket.emit("join",{phone,telegramName});

let selectedCards = [];

/* ================= GENERATE REAL 5x5 CARD ================= */
function generateCard(){

  function r(min,max){
    let arr=[];
    while(arr.length<5){
      let n=Math.floor(Math.random()*(max-min+1))+min;
      if(!arr.includes(n)) arr.push(n);
    }
    return arr.sort((a,b)=>a-b);
  }

  const B=r(1,15);
  const I=r(16,30);
  const N=r(31,45);
  const G=r(46,60);
  const O=r(61,75);

  return [
    [B[0],I[0],N[0],G[0],O[0]],
    [B[1],I[1],N[1],G[1],O[1]],
    [B[2],I[2],"FREE",G[2],O[2]],
    [B[3],I[3],N[3],G[3],O[3]],
    [B[4],I[4],N[4],G[4],O[4]]
  ];
}

/* ================= LOAD 600 CARDS ================= */
function loadCards(){

  let html="";

  for(let i=1;i<=600;i++){

    const card = generateCard();

    html += `
    <div class="card" onclick="selectCard(this,${i})">
      <b>Card ${i}</b>

      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div class="grid">
        ${card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>

    </div>`;
  }

  document.getElementById("cards").innerHTML = html;
}

/* ================= SELECT ================= */
function selectCard(el,i){

  el.classList.toggle("selected");

  if(el.classList.contains("selected")){
    selectedCards.push(i);
  }else{
    selectedCards = selectedCards.filter(x=>x!==i);
  }
}

/* ================= CONFIRM ================= */
function confirmCards(){
  socket.emit("select_cartelas",{phone,cards:selectedCards});
}

/* ================= SOCKET ================= */

socket.on("phase",(p)=>{

  if(p==="picking"){
    alert("🟢 PICK YOUR CARTELAS (30s)");
  }

  if(p==="playing"){
    alert("🎮 GAME STARTED");
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="WAIT FOR NEXT GAME";
  }
});

socket.on("countdown",(t)=>{
  document.getElementById("countdown").innerText="Start in "+t;
});

socket.on("called",(nums)=>{
  document.getElementById("called").innerText =
    "Called: " + nums.join(", ");
});

/* ================= MARK NUMBERS + VOICE ================= */
socket.on("number",(n)=>{

  document.querySelectorAll(".cell").forEach(c=>{
    if(Number(c.innerText)===n){
      c.classList.add("mark");
    }
  });

  let letter="";
  if(n<=15) letter="B";
  else if(n<=30) letter="I";
  else if(n<=45) letter="N";
  else if(n<=60) letter="G";
  else letter="O";

  new Audio(`/voices/${letter}${n}.mp3`).play().catch(()=>{});
});

/* ================= WINNER ================= */
socket.on("winner",(w)=>{

  alert("🏆 WINNER: "+w.telegramName);

  document.getElementById("called").innerText =
    "🏆 WINNER: "+w.telegramName;

  console.log("Winning numbers:", w.numbers);
});

/* ================= END ================= */
socket.on("game_end",(m)=>{
  alert(m);
});

</script>

</body>
</html>
