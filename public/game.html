<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:5px;padding:5px;width:150px;background:#fff;cursor:pointer}
.header{display:grid;grid-template-columns:repeat(5,1fr);background:#ddd;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:4px}
.mark{background:green;color:#fff}
.selected{border:3px solid orange}
#winnerBox{
  background:#fff;
  border:3px solid green;
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>
<h3 id="status"></h3>
<h3 id="called"></h3>

<div id="winnerBox"></div>

<button onclick="enableSound()">🔊 Enable Sound</button>
<button onclick="confirmPick()">Confirm Cartelas</button>

<div id="cards" class="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let myCards=[];
let selected=[];
let audioEnabled=false;
let phase="waiting";

/* ================= 🔊 FIXED AUDIO QUEUE SYSTEM ================= */
let audioQueue = [];
let playing = false;

/* play next sound safely */
function playNext(){

  if(!audioEnabled) return;

  if(audioQueue.length === 0){
    playing = false;
    return;
  }

  playing = true;

  let n = audioQueue.shift();

  let letter =
    n<=15 ? "B" :
    n<=30 ? "I" :
    n<=45 ? "N" :
    n<=60 ? "G" : "O";

  let audio = new Audio(`/voices/${letter}${n}.mp3`);
  audio.volume = 1;

  audio.play().catch(err=>{
    console.log("Audio error:", err);
  });

  audio.onended = ()=>{
    setTimeout(playNext, 250);
  };
}

/* ================= ENABLE SOUND (IMPORTANT FIX) ================= */
function enableSound(){

  audioEnabled = true;

  document.getElementById("status").innerText = "🔊 SOUND ENABLED";

  // MUST unlock browser audio
  let unlock = new Audio("/voices/B1.mp3");

  unlock.play().then(()=>{
    console.log("Audio unlocked");
  }).catch(()=>{
    alert("Click again to fully enable sound");
  });
}

/* ================= USER ================= */
let phone=prompt("Enter Phone");
let name=prompt("Enter Telegram Name");

socket.emit("join",{phone,telegramName:name});

/* ================= LOAD ================= */
socket.on("cards",(cards)=>{

  myCards=cards;

  let html="";

  cards.forEach((c,i)=>{
    html+=`
    <div class="card" onclick="pick(${i},this)">
      <b>Card ${i+1}</b>
      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>
      <div class="grid">
        ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>`;
  });

  document.getElementById("cards").innerHTML=html;
});

/* ================= PICK ================= */
function pick(i,el){

  if(phase !== "picking"){
    alert("⏳ WAIT FOR NEXT GAME");
    return;
  }

  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    el.classList.remove("selected");
  }else{
    selected.push(i);
    el.classList.add("selected");
  }
}

function confirmPick(){

  if(phase !== "picking"){
    alert("⏳ WAIT FOR NEXT GAME");
    return;
  }

  socket.emit("select_cartelas",{
    phone,
    cards:selected.map(i=>myCards[i])
  });
}

/* ================= PHASE ================= */
socket.on("phase",(p)=>{

  phase = p;

  if(p==="picking"){
    document.getElementById("status").innerText="🟢 PICK NOW";
    selected=[];
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  }

  if(p==="playing"){
    document.getElementById("status").innerText="🎮 GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="⏳ WAIT NEXT GAME";
  }
});

/* ================= 🔊 FIXED VOICE ================= */
socket.on("number",(n)=>{

  if(audioEnabled){

    audioQueue.push(n);

    if(!playing){
      playNext();
    }
  }

  document.getElementById("status").innerText = "Number: " + n;
});

/* ================= CALLED ================= */
socket.on("called",(arr)=>{
  document.getElementById("called").innerText =
    "Called: " + arr.join(",");
});

</script>
</body>
</html>
