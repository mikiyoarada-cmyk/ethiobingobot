<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:5px;padding:5px;width:150px;background:white;cursor:pointer}
.selected{border:3px solid orange}
.header{display:grid;grid-template-columns:repeat(5,1fr);font-weight:bold;background:#ddd}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:4px;font-size:12px}
.mark{background:green;color:white}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<h3 id="status"></h3>
<h3 id="called"></h3>

<button id="soundBtn">🔊 Sound</button>
<button id="loadBtn">Load 600 Cards</button>
<button id="confirmBtn">Confirm</button>

<div id="cards" class="cards"></div>

<h2 id="winner"></h2>
<div id="winnerCard"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let audioEnabled=false;
let selected=new Set();
let allCards=[];

let phone=prompt("Phone:");
let telegramName=prompt("Telegram Name:");

/* SOUND */
document.getElementById("soundBtn").onclick=()=>{
  audioEnabled=true;
};

function playVoice(n){
  if(!audioEnabled) return;
  let l=n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
  new Audio(`/voices/${l}${n}.mp3`).play().catch(()=>{});
}

/* CARD */
function r(min,max){
  let a=[];
  while(a.length<5){
    let n=Math.floor(Math.random()*(max-min+1))+min;
    if(!a.includes(n)) a.push(n);
  }
  return a.sort((a,b)=>a-b);
}

function create(){
  const B=r(1,15),I=r(16,30),N=r(31,45),G=r(46,60),O=r(61,75);
  return [
    [B[0],I[0],N[0],G[0],O[0]],
    [B[1],I[1],N[1],G[1],O[1]],
    [B[2],I[2],"FREE",G[2],O[2]],
    [B[3],I[3],N[3],G[3],O[3]],
    [B[4],I[4],N[4],G[4],O[4]],
  ];
}

/* LOAD */
document.getElementById("loadBtn").onclick=()=>{
  let html="";
  allCards=[];

  for(let i=0;i<600;i++){
    let c=create();
    allCards.push(c);

    html+=`
    <div class="card" onclick="pick(${i})" id="c${i}">
      <b>Card ${i+1}</b>
      <div class="header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
      <div class="grid">${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}</div>
    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
};

/* PICK */
function pick(i){
  let el=document.getElementById("c"+i);

  if(selected.has(i)){
    selected.delete(i);
    el.classList.remove("selected");
  }else{
    selected.add(i);
    el.classList.add("selected");
  }
}

/* CONFIRM */
document.getElementById("confirmBtn").onclick=()=>{
  socket.emit("select_cartelas",{phone});
};

/* JOIN */
socket.emit("join",{phone,telegramName});

/* SOCKET */
socket.on("phase",(p)=>{
  if(p==="picking") status.innerText="🟢 PICK NOW (30s)";
  if(p==="playing") status.innerText="🎮 GAME STARTED";
  if(p==="waiting") status.innerText="WAIT NEXT GAME";
});

socket.on("countdown",(t)=>{
  status.innerText="Start in "+t;
});

socket.on("number",(n)=>playVoice(n));

socket.on("called",(nums)=>{
  called.innerText=nums.join(", ");

  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("mark");
    if(nums.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });
});

/* WINNER */
socket.on("winner",(w)=>{

  winner.innerText="🏆 "+w.telegramName+" WON!";

  let html=`
  <div class="card">
    <div class="header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
    <div class="grid">
      ${w.card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
    </div>
  </div>`;

  document.getElementById("winnerCard").innerHTML=html;
});

socket.on("game_end",(m)=>{
  alert(m);
});

socket.on("msg",(m)=>alert(m));

</script>

</body>
</html>
