<!DOCTYPE html>
<html>
<head>
<style>
.card { border:1px solid black; margin:5px; padding:5px; display:inline-block }
.cell { width:22px; height:22px; display:inline-block; text-align:center }
.hit { background:green; color:white; }
</style>
</head>

<body>

<h1>B I N G O GAME</h1>

<!-- PAYMENT -->
<div>
  <h3>Enter Payment</h3>
  <input id="phone" placeholder="Phone">
  <input id="tx" placeholder="Transaction ID">
  <button onclick="pay()">Submit</button>
  <p id="status"></p>
</div>

<hr>

<button onclick="start()">START GAME</button>

<h2 id="num">-</h2>

<h3>Called Numbers</h3>
<div id="history"></div>

<h3>Cards (600)</h3>
<div id="cards"></div>

<h3>Winner</h3>
<div id="winner"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let called = [];
let queue = [];
let cards = [];
let playing = false;
let allowed = false;

/* ======================
   PAYMENT CHECK
====================== */
async function pay() {
  const phone = document.getElementById("phone").value;
  const tx = document.getElementById("tx").value;

  await fetch("/pay", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone, transactionId: tx })
  });

  document.getElementById("status").innerText =
    "Sent! waiting approval";
}

/* ======================
   PREFIX B I N G O
====================== */
function colRange(col) {
  const start = col * 15 + 1;
  return Array.from({length:15}, (_,i)=>start+i);
}

/* ======================
   GENERATE 600 CARDS
====================== */
function generateCards() {
  for (let i = 1; i <= 600; i++) {

    let card = [];

    for (let c = 0; c < 5; c++) {
      let colNums = colRange(c);

      let col = [];

      for (let r = 0; r < 5; r++) {
        col.push(colNums[Math.floor(Math.random()*15)]);
      }

      card.push(col);
    }

    cards.push({ id:i, data:card, won:false });
  }

  render();
}

/* ======================
   RENDER CARDS
====================== */
function render() {
  let html = "";

  cards.forEach(card => {
    html += `<div class="card"><b>${card.id}</b><br>`;

    for (let r=0;r<5;r++){
      for (let c=0;c<5;c++){
        html += `<span class="cell" id="c-${card.id}-${r}-${c}">
          ${card.data[c][r]}
        </span>`;
      }
      html += "<br>";
    }

    html += "</div>";
  });

  document.getElementById("cards").innerHTML = html;
}

/* ======================
   CHECK ACCESS
====================== */
async function start() {
  const phone = document.getElementById("phone").value;

  const res = await fetch("/check", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ phone })
  });

  const data = await res.json();

  if (!data.ok) {
    alert("Not approved / expired");
    return;
  }

  allowed = true;
  socket.emit("start");
}

/* ======================
   PLAY QUEUE
====================== */
socket.on("number", async (num) => {

  queue.push(num);
  if (playing) return;

  playing = true;

  while(queue.length) {
    const n = queue.shift();
    const prefix = getPrefix(n);

    document.getElementById("num").innerText = prefix + "-" + n;
    called.push(n);

    document.getElementById("history").innerText =
      called.join(",");

    highlight();

    let audio = new Audio(`voices/${prefix}${n}.mp3`);
    await audio.play().catch(()=>{});
    await new Promise(r => audio.onended = r);

    await new Promise(r => setTimeout(r, 3000));
  }

  playing = false;
});

function getPrefix(n){
  if(n<=15)return"B";
  if(n<=30)return"I";
  if(n<=45)return"N";
  if(n<=60)return"G";
  return"O";
}

/* ======================
   HIGHLIGHT
====================== */
function highlight(){
  cards.forEach(card=>{
    for(let c=0;c<5;c++){
      for(let r=0;r<5;r++){
        let val = card.data[c][r];
        let el = document.getElementById(`c-${card.id}-${r}-${c}`);
        if(called.includes(val)){
          el.classList.add("hit");
        }
      }
    }
  });
}

socket.on("start", ()=>{
  called=[];
  queue=[];
  document.getElementById("winner").innerText="";
});

socket.on("winner",(id)=>{
  document.getElementById("winner").innerText="🏆 Card "+id+" WIN!";
});

generateCards();
</script>

</body>
</html>
