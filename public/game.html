<!DOCTYPE html>
<html>
<body>

<h1>Bingo Live</h1>

<button onclick="start()">Start Game</button>

<h2 id="num">-</h2>

<h3>Called Numbers:</h3>
<div id="history"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let called = [];
let queue = [];
let playing = false;

// 🔊 PLAY NEXT SOUND (SEQUENTIAL)
async function playQueue() {
  if (playing || queue.length === 0) return;

  playing = true;

  const num = queue.shift();

  // show number
  document.getElementById('num').innerText = num;

  // save history
  called.push(num);
  document.getElementById('history').innerText = called.join(', ');

  // play audio
  let audio = new Audio("voices/B" + num + ".mp3");

  audio.play();

  // WAIT until audio finishes
  await new Promise(resolve => {
    audio.onended = resolve;
  });

  // WAIT 5 seconds AFTER sound
  await new Promise(r => setTimeout(r, 5000));

  playing = false;

  // play next in queue
  playQueue();
}

// GAME START
socket.on('start', async () => {
  called = [];
  queue = [];
  document.getElementById('history').innerText = "";

  // play start voice
  let startAudio = new Audio("voices/start.mp3");
  startAudio.play();

  await new Promise(resolve => {
    startAudio.onended = resolve;
  });

  // small delay
  setTimeout(() => {
    playQueue();
  }, 1000);
});

// RECEIVE NUMBER
socket.on('number', (num) => {
  queue.push(num);
  playQueue();
});

// START BUTTON
function start() {
  socket.emit('start');
}
</script>

</body>
</html>
