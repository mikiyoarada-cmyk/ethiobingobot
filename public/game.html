<!DOCTYPE html>
<html>
<body>

<h1>Bingo Live</h1>

<button onclick="start()">Start Game</button>

<h2 id="num">-</h2>

<h3>Called Numbers:</h3>
<div id="history"></div>

<h3>Cartelas (600)</h3>
<div id="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let called = [];
let queue = [];
let playing = false;
let cards = [];

// 🎯 PREFIX
function getPrefix(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// 🔊 PLAY QUEUE (FASTER)
async function playQueue() {
  if (playing || queue.length === 0) return;

  playing = true;

  const num = queue.shift();
  const prefix = getPrefix(num);

  document.getElementById('num').innerText = prefix + "-" + num;

  called.push(num);
  document.getElementById('history').innerText =
    called.map(n => getPrefix(n) + "-" + n).join(', ');

  let audio = new Audio(`voices/${prefix}${num}.mp3`);

  try {
    await audio.play();
  } catch (e) {}

  // wait audio finish
  await new Promise(resolve => audio.onended = resolve);

  // 🔥 ONLY 3 SECONDS NOW
  await new Promise(r => setTimeout(r, 3000));

  playing = false;
  playQueue();
}

// ===== CARDS GENERATOR =====
function generateCards() {
  for (let i = 1; i <= 600; i++) {
    let card = [];

    for (let r = 0; r < 5; r++) {
      let row = [];
      for (let c = 0; c < 5; c++) {
        row.push(Math.floor(Math.random() * 75) + 1);
      }
      card.push(row);
    }

    cards.push({ id: i, data: card });
  }

  renderCards();
}

// ===== SHOW CARDS =====
function renderCards() {
  let html = "";

  cards.forEach(c => {
    html += `<div style="border:1px solid black;margin:5px;padding:5px">
      <b>Card ${c.id}</b><br>
      ${c.data.map(r => r.join(" ")).join("<br>")}
    </div>`;
  });

  document.getElementById('cards').innerHTML = html;
}

// START
socket.on('start', async () => {
  called = [];
  queue = [];
  document.getElementById('history').innerText = "";

  if (cards.length === 0) generateCards();

  let startAudio = new Audio("voices/start.mp3");
  await startAudio.play();

  await new Promise(r => startAudio.onended = r);

  playQueue();
});

// RECEIVE
socket.on('number', (num) => {
  queue.push(num);
  playQueue();
});

// BUTTON
function start() {
  socket.emit('start');
}
</script>

</body>
</html>
