<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:5px;padding:5px;width:150px;background:#fff;cursor:pointer}
.header{display:grid;grid-template-columns:repeat(5,1fr);background:#ddd;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:4px}
.mark{background:green;color:#fff}
.selected{border:3px solid orange}
#winnerBox{background:#fff;border:3px solid green;padding:10px;margin:10px;}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>
<h3 id="status"></h3>
<h3 id="called"></h3>

<div id="winnerBox"></div>

<button onclick="enableSound()">🔊 Enable Sound</button>
<button onclick="confirmPick()">Confirm Cartelas</button>

<div id="cards" class="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let myCards=[];
let selected=[];
let audioEnabled=false;
let phase="waiting";

/* ================= SYNC CONTROL ================= */
let currentGameId=null;
let audioQueue=[];
let playing=false;
let takenCards=[];

/* ================= AUDIO ENGINE (FIXED SYNC) ================= */
function playNext(){

  if(!audioEnabled) return;

  if(audioQueue.length===0){
    playing=false;
    return;
  }

  playing=true;

  let n=audioQueue.shift();
  let letter=n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";

  let audio=new Audio(`/voices/${letter}${n}.mp3`);
  audio.play().catch(()=>{});

  audio.onended=()=>{
    setTimeout(playNext,120);
  };
}

/* ================= ENABLE SOUND ================= */
function enableSound(){
  audioEnabled=true;
  new Audio("/voices/B1.mp3").play().catch(()=>{});
}

/* ================= USER ================= */
let phone=prompt("Enter Phone");
let name=prompt("Enter Telegram Name");

socket.emit("join",{phone,telegramName:name});

/* ================= GAME ID SYNC ================= */
socket.on("game_id",(id)=>{
  currentGameId=id;
  audioQueue=[];
  playing=false;
});

/* ================= LOAD CARDS ================= */
socket.on("cards",(cards)=>{
  myCards=cards;

  document.getElementById("cards").innerHTML =
    cards.map((c,i)=>`
      <div class="card" onclick="pick(${i},this)">
        <b>Card ${i+1}</b>
        <div class="header">
          <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
        </div>
        <div class="grid">
          ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
        </div>
      </div>
    `).join("");
});

/* ================= TAKEN CARDS ================= */
socket.on("taken",(arr)=>{
  takenCards=arr;

  document.querySelectorAll(".card").forEach((el,i)=>{
    let str=JSON.stringify(myCards[i]);

    if(takenCards.includes(str)){
      el.style.opacity="0.3";
      el.style.pointerEvents="none";
    }else{
      el.style.opacity="1";
      el.style.pointerEvents="auto";
    }
  });
});

/* ================= PICK ================= */
function pick(i,el){

  if(phase!=="picking"){
    alert("⏳ WAIT FOR NEXT GAME");
    return;
  }

  let str=JSON.stringify(myCards[i]);

  if(takenCards.includes(str)){
    alert("❌ Already taken");
    return;
  }

  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    el.classList.remove("selected");
  }else{
    selected.push(i);
    el.classList.add("selected");
  }
}

/* ================= CONFIRM ================= */
function confirmPick(){

  if(phase!=="picking"){
    alert("⏳ WAIT FOR NEXT GAME");
    return;
  }

  socket.emit("select_cartelas",{
    phone,
    cards:selected.map(i=>myCards[i])
  });
}

/* ================= PHASE ================= */
socket.on("phase",(p)=>{
  phase=p;

  if(p==="picking"){
    document.getElementById("status").innerText="🟢 PICK NOW";
    selected=[];
    document.getElementById("winnerBox").innerHTML="";
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  }

  if(p==="playing"){
    document.getElementById("status").innerText="🎮 GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="⏳ WAIT NEXT GAME";
  }
});

/* ================= NUMBER (SYNC FIX) ================= */
socket.on("number",(data)=>{

  if(data.gameId !== currentGameId) return;

  audioQueue.push(data.value);

  if(!playing){
    playNext();
  }
});

/* ================= CALLED NUMBERS ================= */
socket.on("called",(data)=>{

  if(data.gameId !== currentGameId) return;

  document.getElementById("called").innerText =
    "Called: "+data.list.join(",");

  document.querySelectorAll(".cell").forEach(c=>{
    let val=c.innerText;

    if(val!=="FREE" && data.list.includes(Number(val))){
      c.classList.add("mark");
    }
  });
});

/* ================= WINNER ================= */
socket.on("winner",(w)=>{
  document.getElementById("winnerBox").innerHTML=`
    <h2>🏆 ${w.telegramName}</h2>
  `;
});

/* ================= STOP AUDIO ================= */
socket.on("stop_audio",(id)=>{
  if(id===currentGameId){
    audioQueue=[];
    playing=false;
  }
});

/* ================= GAME END ================= */
socket.on("game_end",(m)=>{
  document.getElementById("status").innerText=m;
  selected=[];
});

</script>
</body>
</html>
