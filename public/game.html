<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo Game</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
.cards{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:5px;padding:5px;width:150px;background:#fff;cursor:pointer}
.header{display:grid;grid-template-columns:repeat(5,1fr);background:#ddd;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(5,1fr)}
.cell{border:1px solid #000;padding:4px}
.mark{background:green;color:#fff}
.selected{border:3px solid orange}
.taken{opacity:0.4;pointer-events:none}
#winnerBox{
  background:#fff;
  border:3px solid green;
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>
<h3 id="status"></h3>
<h3 id="called"></h3>

<div id="winnerBox"></div>

<button onclick="enableSound()">🔊 Enable Sound</button>
<button onclick="confirmPick()">Confirm Cartelas</button>

<div id="cards" class="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

let myCards=[];
let selected=[];
let audioEnabled=false;
let phase="waiting";
let currentGameId=0;

/* ================= SOUND ================= */
function enableSound(){
  audioEnabled=true;
  new Audio("/voices/B1.mp3").play().catch(()=>{});
}

/* ================= USER ================= */
let phone=prompt("Enter Phone");
let name=prompt("Enter Telegram Name");

socket.emit("join",{phone,telegramName:name});

/* ================= LOAD ================= */
socket.on("cards",(cards)=>{

  myCards=cards;

  let html="";

  cards.forEach((c,i)=>{
    html+=`
    <div class="card" id="card-${i}" onclick="pick(${i},this)">
      <b>Card ${i+1}</b>
      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>
      <div class="grid">
        ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>`;
  });

  document.getElementById("cards").innerHTML=html;
});

/* ================= PICK ================= */
function pick(i,el){

  if(phase !== "picking"){
    alert("WAIT NEXT GAME");
    return;
  }

  if(el.classList.contains("taken")){
    alert("ALREADY TAKEN");
    return;
  }

  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    el.classList.remove("selected");
  }else{
    selected.push(i);
    el.classList.add("selected");
  }
}

function confirmPick(){

  if(phase !== "picking"){
    alert("WAIT NEXT GAME");
    return;
  }

  if(selected.length===0){
    alert("Select cards");
    return;
  }

  socket.emit("select_cartelas",{
    phone,
    cards:selected.map(i=>myCards[i])
  });
}

/* ================= PHASE ================= */
socket.on("phase",(p)=>{

  phase=p;

  if(p==="picking"){
    document.getElementById("status").innerText="PICK NOW";
    document.getElementById("winnerBox").innerHTML="";
    selected=[];

    document.querySelectorAll(".card").forEach(c=>{
      c.classList.remove("selected");
      c.classList.remove("taken");
    });

    document.querySelectorAll(".cell").forEach(c=>{
      c.classList.remove("mark");
    });
  }

  if(p==="playing"){
    document.getElementById("status").innerText="GAME STARTED";
  }

  if(p==="waiting"){
    document.getElementById("status").innerText="WAIT NEXT GAME";
  }
});

/* ================= GAME ID ================= */
socket.on("game_id",(id)=>{
  currentGameId=id;
});

/* ================= TAKEN ================= */
socket.on("taken",(list)=>{

  document.querySelectorAll(".card").forEach((cardEl,i)=>{

    let str=JSON.stringify(myCards[i]);

    if(list.includes(str)){
      cardEl.classList.add("taken");
    }
  });
});

/* ================= COUNTDOWN ================= */
socket.on("countdown",(t)=>{
  document.getElementById("status").innerText="Start in "+t;
});

/* ================= NUMBER ================= */
socket.on("number",(data)=>{

  if(data.gameId !== currentGameId) return;

  let n=data.value;

  if(audioEnabled){
    let letter = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
    new Audio(`/voices/${letter}${n}.mp3`).play().catch(()=>{});
  }
});

/* ================= CALLED ================= */
socket.on("called",(data)=>{

  if(data.gameId !== currentGameId) return;

  let arr=data.list;

  document.getElementById("called").innerText="Called: "+arr.join(",");

  document.querySelectorAll(".cell").forEach(c=>{
    let val=c.innerText;

    if(val !== "FREE" && arr.includes(Number(val))){
      c.classList.add("mark");
    }else{
      c.classList.remove("mark");
    }
  });
});

/* ================= WINNER ================= */
socket.on("winner",(w)=>{

  document.getElementById("winnerBox").innerHTML=`
    <h2>WINNER: ${w.telegramName}</h2>
    <div class="card">
      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>
      <div class="grid">
        ${w.card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>
  `;
});

/* ================= RESET ================= */
socket.on("reset_board",()=>{

  document.getElementById("called").innerText="";

  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("mark");
  });

  document.querySelectorAll(".card").forEach(c=>{
    c.classList.remove("selected");
    c.classList.remove("taken");
  });

  selected=[];
});

/* ================= STOP AUDIO ================= */
socket.on("stop_audio",()=>{
  audioEnabled=false;
});

</script>
</body>
</html>
