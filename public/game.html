<!DOCTYPE html>
<html>
<head>
<style>
body{text-align:center;font-family:Arial}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  border:2px solid black;
  margin:5px;
  padding:5px;
  width:150px;
}

.header{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  font-weight:bold;
  background:#ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

.cell{
  border:1px solid black;
  padding:5px;
}

.mark{
  background:green;
  color:white;
}

.winner{
  border:3px solid gold;
}
</style>
</head>

<body>

<h2>🎯 BINGO GAME</h2>

<button onclick="initAudio()">🔊 Enable Sound</button>
<button onclick="generateCards()">Load 600 Cards</button>
<button onclick="startGame()">Start Game</button>

<h3 id="called"></h3>
<h2 id="winner"></h2>

<div id="cards" class="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io();
let cards=[];
let voices=[];
let audioEnabled=false;

/* 🔊 FIX: LOAD VOICES */
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};

/* 🔊 USER MUST CLICK THIS */
function initAudio(){
  audioEnabled=true;

  const test = new SpeechSynthesisUtterance("Sound ready");
  test.voice = voices[0];
  speechSynthesis.speak(test);
}

/* 🔊 SPEAK FUNCTION (FIXED) */
function speakNumber(num){
  if(!audioEnabled) return;

  let letter="";
  if(num<=15) letter="B";
  else if(num<=30) letter="I";
  else if(num<=45) letter="N";
  else if(num<=60) letter="G";
  else letter="O";

  const msg = new SpeechSynthesisUtterance(letter+" "+num);

  msg.voice = voices.find(v=>v.lang.includes("en")) || voices[0];
  msg.rate = 0.9;
  msg.pitch = 1;

  speechSynthesis.cancel(); // prevent overlap
  speechSynthesis.speak(msg);
}

/* 🎯 CARD LOGIC */
function unique(min,max){
  let arr=[];
  while(arr.length<5){
    let n=Math.floor(Math.random()*(max-min+1))+min;
    if(!arr.includes(n)) arr.push(n);
  }
  return arr.sort((a,b)=>a-b);
}

function createCard(){
  const B=unique(1,15);
  const I=unique(16,30);
  const N=unique(31,45);
  const G=unique(46,60);
  const O=unique(61,75);

  return [
    [B[0],I[0],N[0],G[0],O[0]],
    [B[1],I[1],N[1],G[1],O[1]],
    [B[2],I[2],"FREE",G[2],O[2]],
    [B[3],I[3],N[3],G[3],O[3]],
    [B[4],I[4],N[4],G[4],O[4]],
  ];
}

/* 🎯 GENERATE CARDS */
function generateCards(){
  let html="";
  cards=[];

  for(let i=0;i<600;i++){
    let c=createCard();
    cards.push(c);

    html+=`
    <div class="card" id="card${i}">
      <b>Card ${i+1}</b>

      <div class="header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div class="grid">
        ${c.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
      </div>
    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
}

/* 🏆 CHECK WIN */
function checkWin(card, called){
  for(let r of card){
    if(r.every(n => n==="FREE" || called.includes(n))) return true;
  }

  for(let i=0;i<5;i++){
    let col=true;
    for(let j=0;j<5;j++){
      let n=card[j][i];
      if(!(n==="FREE" || called.includes(n))){
        col=false;
      }
    }
    if(col) return true;
  }

  return false;
}

/* 🎮 GAME */
function startGame(){
  document.getElementById("winner").innerText="";
  socket.emit("start");
}

socket.on("number",(num)=>{
  speakNumber(num); // 🔊 VOICE
});

socket.on("called",(nums)=>{
  document.getElementById("called").innerText="Called: "+nums.join(", ");

  document.querySelectorAll(".cell").forEach(c=>{
    if(nums.includes(Number(c.innerText))){
      c.classList.add("mark");
    }
  });

  for(let i=0;i<cards.length;i++){
    if(checkWin(cards[i],nums)){
      document.getElementById("winner").innerText="🏆 GOOD BINGO (Card "+(i+1)+")";
      document.getElementById("card"+i).classList.add("winner");

      speakNumber(999); // trigger sound
      return;
    }
  }
});
</script>

</body>
</html>
