<!DOCTYPE html>
<html>
<body>

<h1>Bingo Live</h1>
<button onclick="start()">Start</button>

<h2 id="num"></h2>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

socket.on('start', ()=>{
  new Audio("voices/start.mp3").play();
});

socket.on('number', (num)=>{
  document.getElementById('num').innerText = num;
  new Audio("voices/B"+num+".mp3").play();
});

function start(){
  socket.emit('start');
}
</script>

</body>
</html>
