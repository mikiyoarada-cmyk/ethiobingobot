<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bingo</title>

<style>
body{text-align:center;font-family:Arial;background:#f5f5f5;}
.card{display:inline-block;border:2px solid #000;margin:5px;padding:5px;width:150px;}
.cell{border:1px solid #000;padding:4px;font-size:12px;}
.mark{background:green;color:white;}
.selected{border:4px solid gold;}
#cards{display:flex;flex-wrap:wrap;justify-content:center;}
</style>
</head>

<body>

<h2>🎯 BINGO</h2>

<h3 id="status"></h3>
<h3 id="countdown"></h3>
<h3 id="called"></h3>

<button onclick="loadCards()">Load 600 Cards</button>
<button onclick="confirmCards()">Confirm Cartelas</button>

<div id="cards"></div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket=io();

let phone=prompt("Enter phone");
let telegramName=prompt("Enter telegram name");

socket.emit("join",{phone,telegramName});

let selectedCards=[];

/* LOAD 600 CARDS */
function loadCards(){

  let html="";

  for(let i=1;i<=600;i++){

    let card=generateCard();

    html+=`
    <div class="card" onclick="selectCard(this,${i})">
      <b>${i}</b>
      ${card.flat().map(n=>`<div class="cell">${n}</div>`).join("")}
    </div>`;
  }

  document.getElementById("cards").innerHTML=html;
}

/* GENERATE */
function generateCard(){
  function r(min,max){
    let a=[];
    while(a.length<5){
      let n=Math.floor(Math.random()*(max-min+1))+min;
      if(!a.includes(n)) a.push(n);
    }
    return a.sort((a,b)=>a-b);
  }

  return [
    ...r(1,15),
    ...r(16,30),
    ...r(31,45),
    ...r(46,60),
    ...r(61,75)
  ];
}

/* SELECT */
function selectCard(el,i){

  el.classList.toggle("selected");

  if(el.classList.contains("selected")){
    selectedCards.push(i);
  }else{
    selectedCards=selectedCards.filter(x=>x!==i);
  }
}

/* CONFIRM */
function confirmCards(){
  socket.emit("select_cartelas",{phone,cards:selectedCards});
}

/* SOCKET EVENTS */

socket.on("phase",(p)=>{
  if(p==="picking") alert("🟢 PICK NOW (30s)");
  if(p==="playing") alert("🎮 STARTED");
  if(p==="waiting") document.getElementById("status").innerText="WAIT NEXT GAME";
});

socket.on("countdown",(t)=>{
  document.getElementById("countdown").innerText="Start in "+t;
});

socket.on("called",(nums)=>{
  document.getElementById("called").innerText=nums.join(",");
});

socket.on("number",(n)=>{

  document.querySelectorAll(".cell").forEach(c=>{
    if(Number(c.innerText)===n){
      c.classList.add("mark");
    }
  });

  let letter="";
  if(n<=15) letter="B";
  else if(n<=30) letter="I";
  else if(n<=45) letter="N";
  else if(n<=60) letter="G";
  else letter="O";

  new Audio(`/voices/${letter}${n}.mp3`).play().catch(()=>{});
});

socket.on("winner",(w)=>{
  alert("🏆 "+w.telegramName+" WON");
  console.log(w.numbers);
});

socket.on("game_end",(m)=>{
  alert(m);
});

</script>

</body>
</html>
