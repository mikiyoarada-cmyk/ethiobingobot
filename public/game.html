<script>
/* ADD THIS ONLY BELOW your variables */

let takenCards = [];

/* ================= TAKEN CARDS ================= */
socket.on("taken",(arr)=>{
  takenCards = arr;

  document.querySelectorAll(".card").forEach((cardEl, i)=>{

    let card = myCards[i];
    let str = JSON.stringify(card);

    if(takenCards.includes(str)){
      cardEl.style.opacity = "0.3";
      cardEl.style.pointerEvents = "none";
    }else{
      cardEl.style.opacity = "1";
      cardEl.style.pointerEvents = "auto";
    }
  });
});

/* MODIFY PICK FUNCTION */
function pick(i,el){

  if(phase !== "picking"){
    alert("⏳ WAIT FOR NEXT GAME");
    return;
  }

  let str = JSON.stringify(myCards[i]);

  if(takenCards.includes(str)){
    alert("❌ Already taken");
    return;
  }

  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
    el.classList.remove("selected");
  }else{
    selected.push(i);
    el.classList.add("selected");
  }
}
</script>
