<!DOCTYPE html>
<html>
<body>

<h1>Bingo Live</h1>

<button onclick="start()">Start Game</button>

<h2 id="num">-</h2>

<h3>Called Numbers:</h3>
<div id="history"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let called = [];
let queue = [];
let playing = false;

// 🎯 GET PREFIX (B I N G O)
function getPrefix(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// 🔊 PLAY QUEUE (PERFECT SYNC)
async function playQueue() {
  if (playing || queue.length === 0) return;

  playing = true;

  const num = queue.shift();
  const prefix = getPrefix(num);

  // show number
  document.getElementById('num').innerText = prefix + "-" + num;

  // save history
  called.push(num);
  document.getElementById('history').innerText =
    called.map(n => getPrefix(n) + "-" + n).join(', ');

  // 🔊 CORRECT AUDIO FILE
  let audio = new Audio(`voices/${prefix}${num}.mp3`);

  try {
    await audio.play();
  } catch (e) {
    console.log("Audio error:", e);
  }

  // wait until audio ends
  await new Promise(resolve => {
    audio.onended = resolve;
  });

  // wait 5 seconds after voice
  await new Promise(r => setTimeout(r, 5000));

  playing = false;

  // next number
  playQueue();
}

// START GAME
socket.on('start', async () => {
  called = [];
  queue = [];
  document.getElementById('history').innerText = "";

  let startAudio = new Audio("voices/start.mp3");

  try {
    await startAudio.play();
  } catch (e) {}

  await new Promise(resolve => {
    startAudio.onended = resolve;
  });

  playQueue();
});

// RECEIVE NUMBER
socket.on('number', (num) => {
  queue.push(num);
  playQueue();
});

// BUTTON
function start() {
  socket.emit('start');
}
</script>

</body>
</html>
