<!DOCTYPE html>
<html>
<head>
  <title>Bingo Admin</title>
</head>
<body>

<h2>Admin Panel</h2>

<button onclick="startGame()">▶ Start Game (40s)</button>

<h3 id="countdown">40</h3>

<div id="users"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* LOAD USERS */
async function load() {
  const res = await fetch("/admin/list");
  const users = await res.json();

  document.getElementById("users").innerHTML =
    users.map(u => `
      <div style="border:1px solid #000;padding:5px;margin:5px">
        📞 ${u.phone}
        <br>
        <b>Cartela:</b> ${JSON.stringify(u.cartela)}
      </div>
    `).join("");
}

function startGame() {
  socket.emit("startGame");
}

socket.on("countdown", (t) => {
  document.getElementById("countdown").innerText = t;
});

load();
</script>

</body>
</html>
