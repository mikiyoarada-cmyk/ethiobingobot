<!DOCTYPE html>
<html>
<head>
  <title>Admin Bingo</title>
</head>
<body>

<h2>Admin Panel</h2>

<button onclick="startGame()">▶ Start Game (40s)</button>

<div id="users"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* LOAD USERS */
async function load() {
  const res = await fetch("/admin/list");
  const data = await res.json();

  document.getElementById("users").innerHTML =
    data.map(u => `
      <div>
        ${u.phone} - ${u.status}
        <button onclick="approve('${u._id}')">Approve</button>
        <button onclick="reject('${u._id}')">Reject</button>
      </div>
    `).join("");
}

async function approve(id) {
  await fetch("/admin/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("/admin/reject/" + id, { method: "POST" });
  load();
}

/* START GAME */
function startGame() {
  socket.emit("startGame");
}

load();
</script>

</body>
</html>
