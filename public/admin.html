<!DOCTYPE html>
<html>
<head>
  <title>Bingo Admin</title>
</head>
<body>

<h2>Admin Panel</h2>

<button onclick="startGame()">▶ Start Game (40s)</button>

<h3 id="count">40</h3>

<h3>Users</h3>
<div id="users"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

/* LOAD USERS */
async function loadUsers() {
  const res = await fetch("/admin/users");
  const users = await res.json();

  document.getElementById("users").innerHTML =
    users.map(u => `
      <div style="border:1px solid #000;padding:5px;margin:5px">
        📞 ${u.phone} <br>
        💰 Balance: ${u.balance} <br>
        🎫 Cartela: ${JSON.stringify(u.cartela || [])}
        <br><br>
        <button onclick="addBalance('${u.phone}', 50)">+50</button>
        <button onclick="addBalance('${u.phone}', 100)">+100</button>
      </div>
    `).join("");
}

async function addBalance(phone, amount) {
  await fetch("/add-balance", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone, amount })
  });

  loadUsers();
}

/* START GAME */
function startGame() {
  socket.emit("startGame");
}

socket.on("countdown", (t) => {
  document.getElementById("count").innerText = t;
});

loadUsers();
</script>

</body>
</html>
