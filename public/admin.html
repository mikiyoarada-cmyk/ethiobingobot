<!DOCTYPE html>
<html>
<head>
  <title>Ethio Bingo Admin</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 { color: #00ffcc; }

    .card {
      background: #222;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      padding: 6px 12px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .approve { background: green; color: white; }
    .reject { background: red; color: white; }

    .status {
      font-weight: bold;
    }

    .pending { color: orange; }
    .approved { color: lime; }
    .rejected { color: red; }
  </style>
</head>

<body>

<h1>🎯 Ethio Bingo Admin Panel</h1>

<button onclick="loadUsers()">🔄 Refresh</button>

<div id="users"></div>

<script>
const API = "";

async function loadUsers() {
  const res = await fetch(API + "/admin/list");
  const users = await res.json();

  document.getElementById("users").innerHTML =
    users.map(u => `
      <div class="card">
        <div><b>📞 Phone:</b> ${u.phone}</div>
        <div><b>💳 TX ID:</b> ${u.transactionId}</div>
        <div><b>Status:</b> <span class="status ${u.status}">${u.status}</span></div>

        <button class="approve" onclick="approve('${u._id}')">Approve</button>
        <button class="reject" onclick="reject('${u._id}')">Reject</button>
      </div>
    `).join("");
}

async function approve(id) {
  await fetch("/admin/approve/" + id, { method: "POST" });
  loadUsers();
}

async function reject(id) {
  await fetch("/admin/reject/" + id, { method: "POST" });
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
