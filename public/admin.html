<!DOCTYPE html>
<html>
<body>

<h2>ADMIN PANEL</h2>

<button onclick="load()">Refresh Users</button>

<div id="users"></div>

<script>
async function load(){
  const res = await fetch("/admin/list");
  const users = await res.json();

  let html="";

  users.forEach(u=>{
    html+=`
    <div style="border:1px solid black;margin:5px;padding:5px">
      ${u.phone} | ${u.status} | ${u.balance}
      <br>
      <button onclick="approve('${u.phone}')">Approve</button>
      <button onclick="reject('${u.phone}')">Reject</button>
    </div>`;
  });

  document.getElementById("users").innerHTML=html;
}

async function approve(phone){
  await fetch("/admin/approve/"+phone,{method:"POST"});
  load();
}

async function reject(phone){
  await fetch("/admin/reject/"+phone,{method:"POST"});
  load();
}
</script>

</body>
</html>
