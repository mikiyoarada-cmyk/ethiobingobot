<!DOCTYPE html>
<html>
<body>

<h2>ADMIN PANEL</h2>

<button onclick="loadUsers()">Load Users</button>
<button onclick="startGame()">Start Game</button>

<h3>Users</h3>
<div id="users"></div>

<h3>Players</h3>
<div id="players"></div>

<h3>Winner</h3>
<div id="winner"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

async function loadUsers() {
  const res = await fetch("/admin/list");
  const data = await res.json();

  let html = "";

  data.forEach(u => {
    html += `
      <div>
        ${u.phone} - ${u.status}
        <button onclick="approve('${u.phone}')">Approve</button>
      </div>
    `;
  });

  document.getElementById("users").innerHTML = html;
}

async function approve(phone) {
  await fetch("/admin/approve/" + phone, { method:"POST" });
  loadUsers();
}

function startGame() {
  socket.emit("start");
}

socket.on("players", p => {
  document.getElementById("players").innerText = p.join(", ");
});

socket.on("winner", w => {
  document.getElementById("winner").innerText = "🏆 " + w;
});
</script>

</body>
</html>
