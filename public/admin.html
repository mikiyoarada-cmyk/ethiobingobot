<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    .user { border:1px solid #ccc; padding:10px; margin:10px; }
    button { margin:5px; padding:5px 10px; }
  </style>
</head>

<body>

<h2>Admin Dashboard</h2>

<button onclick="load()">Refresh</button>

<div id="users"></div>

<script>
async function load() {
  const res = await fetch("/admin/list");
  const data = await res.json();

  document.getElementById("users").innerHTML =
    data.map(u => `
      <div class="user">
        <b>${u.phone}</b><br>
        ${u.transactionId}<br>
        Status: ${u.status}<br>

        <button onclick="approve('${u._id}')">Approve</button>
        <button onclick="reject('${u._id}')">Reject</button>
      </div>
    `).join("");
}

async function approve(id) {
  await fetch("/admin/approve/" + id, { method: "POST" });
  load();
}

async function reject(id) {
  await fetch("/admin/reject/" + id, { method: "POST" });
  load();
}

load();
</script>

</body>
</html>
