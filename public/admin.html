<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{font-family:Arial;background:#111;color:#fff}
table{width:100%;margin-top:20px}
th,td{padding:10px;border:1px solid #444}
</style>
</head>
<body>

<h1>🔥 ADMIN DASHBOARD</h1>

<button onclick="load()">REFRESH</button>

<h2>Users</h2>
<table id="users"></table>

<h2>Withdraws</h2>
<table id="withdraws"></table>

<script>
async function load(){
  const res = await fetch("/admin/data");
  const data = await res.json();

  document.getElementById("users").innerHTML =
  "<tr><th>Phone</th><th>Status</th><th>Balance</th></tr>" +
  data.users.map(u=>
    `<tr><td>${u.phone}</td><td>${u.status}</td><td>${u.balance}</td></tr>`
  ).join("");

  document.getElementById("withdraws").innerHTML =
  "<tr><th>Phone</th><th>Amount</th><th>Status</th></tr>" +
  data.withdraws.map(w=>
    `<tr><td>${w.phone}</td><td>${w.amount}</td><td>${w.status}</td></tr>`
  ).join("");
}

load();
setInterval(load,3000);
</script>

</body>
</html>
