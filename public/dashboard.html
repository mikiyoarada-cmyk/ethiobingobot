<!DOCTYPE html>
<html>
<head>
  <title>Bingo</title>
</head>
<body>

<h1>Bingo Dashboard</h1>

<button onclick="start()">Start Game</button>

<h2 id="status"></h2>

<script>
async function start() {
  let res = await fetch('/start');
  let data = await res.json();
  document.getElementById('status').innerText = data.msg;
}
</script>

</body>
</html>
